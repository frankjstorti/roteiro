<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Explorador do Roteiro MENSAL — Folha de Pagamento</title>
<style>
  :root{
    --bg:#0e1117; --bg2:#161b22; --bg3:#1c2230; --line:#2a3140;
    --txt:#d7dde6; --muted:#8b96a6; --accent:#58a6ff; --accent2:#3fb950;
    --warn:#d29922; --venc:#3fb950; --desc:#f85149; --base:#58a6ff;
    --enc:#bc8cff; --outro:#8b96a6;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);
    font:14px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header{position:sticky;top:0;z-index:30;background:var(--bg2);
    border-bottom:1px solid var(--line);padding:10px 18px}
  h1{margin:0 0 2px;font-size:17px;font-weight:650}
  .sub{color:var(--muted);font-size:12px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px;align-items:center}
  .searchwrap{position:relative;flex:1 1 280px;min-width:220px}
  input[type=search]{width:100%;background:var(--bg3);
    border:1px solid var(--line);color:var(--txt);padding:8px 11px;
    border-radius:7px;font-size:14px}
  input[type=search]::placeholder{color:var(--muted)}
  select,.chip,.modebtn{background:var(--bg3);border:1px solid var(--line);color:var(--txt);
    padding:7px 10px;border-radius:7px;font-size:13px;cursor:pointer}
  .chip{user-select:none}
  .chip.on{border-color:var(--accent);color:#fff;background:#1f2c3f}
  .chip.inss.on{border-color:var(--accent2);background:#15301f}
  .chip.fgts.on{border-color:var(--warn);background:#332a13}
  .chip.irrf.on{border-color:var(--enc);background:#2a1f3a}
  .modes{display:flex;gap:0;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .modebtn{border:none;border-radius:0;background:transparent}
  .modebtn.on{background:#1f2c3f;color:#fff}
  .count{color:var(--muted);font-size:12px;margin-left:auto;font-variant-numeric:tabular-nums}
  /* dropdown de busca (modo Trace) */
  .sresults{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:50;
    background:var(--bg2);border:1px solid var(--line);border-radius:7px;
    max-height:340px;overflow:auto;display:none;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .sresults.show{display:block}
  .sresults .r{padding:7px 11px;border-bottom:1px solid var(--line);cursor:pointer;
    display:grid;grid-template-columns:54px 60px 1fr;gap:9px;align-items:center}
  .sresults .r:hover{background:var(--bg3)}
  .sresults .r:last-child{border-bottom:none}
  .sresults .empty{padding:12px;color:var(--muted)}
  /* mini-mapa de fases */
  .minimap{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .mm{display:flex;align-items:center;gap:6px;background:var(--bg3);
    border:1px solid var(--line);border-radius:20px;padding:3px 9px;font-size:11.5px;
    cursor:pointer;color:var(--muted);white-space:nowrap;user-select:none}
  .mm:hover{border-color:var(--accent)}
  .mm .n{font-variant-numeric:tabular-nums;background:#0d1117;border-radius:10px;
    padding:0 6px;color:var(--txt)}
  .mm.cur{border-color:var(--accent);color:#fff;background:#1f2c3f}
  .mm.cur .n{background:var(--accent);color:#06243f}
  main{padding:14px 18px 90px;max-width:1100px;margin:0 auto}

  /* ---------- LISTA ---------- */
  .phase{margin:18px 0 6px;display:flex;align-items:center;gap:10px}
  .phase h2{font-size:13px;letter-spacing:.04em;text-transform:uppercase;
    margin:0;color:var(--accent);font-weight:650}
  .phase .ln{flex:1;height:1px;background:var(--line)}
  .phase .pc{color:var(--muted);font-size:12px}
  .step{display:grid;grid-template-columns:48px 70px 1fr auto;gap:10px;
    align-items:center;padding:8px 10px;border:1px solid var(--line);
    border-radius:7px;margin:5px 0;background:var(--bg2);cursor:pointer}
  .step:hover{border-color:var(--accent);background:var(--bg3)}
  .ord{color:var(--muted);font-variant-numeric:tabular-nums;font-size:12px;text-align:right}
  .cod{font-variant-numeric:tabular-nums;color:var(--txt);font-size:12px;
    background:var(--bg3);border:1px solid var(--line);border-radius:5px;
    padding:2px 6px;text-align:center}
  .cod.none{color:var(--muted);font-style:italic}
  .nm{font-weight:550}
  .dsc{color:var(--muted);font-size:12px}
  .tags{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
  .t{font-size:10.5px;padding:2px 6px;border-radius:20px;border:1px solid var(--line);
    color:var(--muted);white-space:nowrap}
  .t.nat-VENCIMENTO{color:var(--venc);border-color:#1c4a2e}
  .t.nat-DESCONTO{color:var(--desc);border-color:#5a2220}
  .t.nat-BASE{color:var(--base);border-color:#1f3a5a}
  .t.nat-ENCARGOS{color:var(--enc);border-color:#3a2a5a}
  .t.inc{color:#fff}
  .t.inc-inss{background:#15301f;border-color:#1c4a2e}
  .t.inc-fgts{background:#332a13;border-color:#4a3b13}
  .t.inc-irrf{background:#2a1f3a;border-color:#3a2a5a}
  .t.semv{color:var(--warn);border-color:#4a3b13}
  .empty{color:var(--muted);text-align:center;padding:40px}

  /* ---------- TRACE ---------- */
  #traceView{max-width:760px;margin:0 auto}
  .ctxlabel{text-align:center;color:var(--muted);font-size:11px;
    text-transform:uppercase;letter-spacing:.05em;margin:2px 0 4px}
  .trow{display:grid;grid-template-columns:52px 64px 1fr auto;gap:10px;align-items:center;
    padding:7px 11px;border:1px solid var(--line);border-radius:7px;margin:5px auto;
    background:var(--bg2);cursor:pointer;transition:opacity .12s, transform .12s}
  .trow:hover{border-color:var(--accent);opacity:1 !important}
  .trow .fasechip{font-size:10.5px;color:var(--muted);border:1px solid var(--line);
    border-radius:20px;padding:1px 7px;white-space:nowrap}
  .focuscard{border:1px solid var(--accent);border-radius:11px;background:var(--bg2);
    margin:10px auto;box-shadow:0 6px 26px rgba(0,0,0,.45)}
  .focuscard .hd{padding:15px 18px;border-bottom:1px solid var(--line)}
  .focuscard .hd h3{margin:0;font-size:16px}
  .focuscard .bd{padding:14px 18px}
  .navhint{text-align:center;color:var(--muted);font-size:11px;margin:6px 0 2px}
  .navhint kbd{background:var(--bg3);border:1px solid var(--line);border-radius:4px;
    padding:1px 6px;font-size:11px}

  /* modal (lista) */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;
    z-index:60;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .overlay.show{display:flex}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:11px;
    max-width:760px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  .card h3{margin:0;font-size:16px}
  .card .hd{padding:16px 18px;border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .card .bd{padding:16px 18px}
  .x{cursor:pointer;color:var(--muted);font-size:22px;line-height:1;border:none;background:none}
  .x:hover{color:#fff}
  .kv{display:grid;grid-template-columns:200px 1fr;gap:4px 14px;font-size:13px}
  .kv dt{color:var(--muted)}
  .kv dd{margin:0;color:var(--txt)}
  .sec{margin-top:16px}
  .sec h4{margin:0 0 8px;font-size:12px;text-transform:uppercase;
    letter-spacing:.04em;color:var(--accent)}
  .nbr{display:grid;grid-template-columns:54px 64px 1fr;gap:10px;padding:7px 9px;
    border:1px solid var(--line);border-radius:6px;margin:4px 0;align-items:center;
    cursor:pointer;background:var(--bg3)}
  .nbr:hover{border-color:var(--accent)}
  .nbr.cur{border-color:var(--accent);background:#1f2c3f}
  .nbr .lbl{font-size:10px;color:var(--muted);text-transform:uppercase}
  .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;
    border:1px solid var(--line);color:var(--muted)}
  .badgep{font-size:11px;background:var(--bg3);border:1px solid var(--line);
    border-radius:20px;padding:3px 9px;color:var(--accent)}
  .poslist{display:flex;gap:6px;flex-wrap:wrap}
  .poslist a{color:var(--accent);text-decoration:none;border:1px solid var(--line);
    border-radius:5px;padding:2px 7px;font-size:12px;cursor:pointer}
  mark{background:#3a3000;color:#ffe08a;border-radius:2px}
</style>
</head>
<body>
<header>
  <h1>Explorador do Roteiro MENSAL <span class="sub">— folha de pagamento</span></h1>
  <div class="sub" id="metaline"></div>
  <div class="controls">
    <div class="searchwrap">
      <input type="search" id="q" placeholder="Buscar verba / código / descrição…  (Trace: salta o foco · Lista: filtra)" autocomplete="off">
      <div class="sresults" id="sresults"></div>
    </div>
    <select id="fFase"><option value="">Todas as fases</option></select>
    <select id="fNat">
      <option value="">Toda natureza</option>
      <option value="VENCIMENTO">Vencimento</option>
      <option value="DESCONTO">Desconto</option>
      <option value="BASE">Base</option>
      <option value="ENCARGOS">Encargos</option>
      <option value="OUTROS">Outros</option>
      <option value="__SEMV__">Sem vínculo</option>
    </select>
    <span class="chip inss" data-inc="inss">INSS</span>
    <span class="chip fgts" data-inc="fgts">FGTS</span>
    <span class="chip irrf" data-inc="irrf">IRRF</span>
    <div class="modes">
      <button class="modebtn" id="mTrace">Trace</button>
      <button class="modebtn" id="mList">Lista</button>
    </div>
    <span class="count" id="count"></span>
  </div>
  <div class="minimap" id="minimap"></div>
</header>

<main>
  <div id="traceView"></div>
  <div id="listView" style="display:none"></div>
</main>

<div class="overlay" id="overlay">
  <div class="card" id="card"></div>
</div>

const PASSOS = DATA.passos;
const META = DATA.meta;
const byPos = {}; PASSOS.forEach(p => byPos[p.pos] = p);
const posByCod = {};
PASSOS.forEach(p => { if(p.cod_verba){ (posByCod[p.cod_verba] ||= []).push(p); } });

let mode = 'trace';            // 'trace' | 'list'  (Trace é o padrão)
let focusPos = 0;              // pos do passo focado no modo Trace
const inc = {inss:false, fgts:false, irrf:false};

const qEl = document.getElementById('q');
const selFase = document.getElementById('fFase');
const selNat = document.getElementById('fNat');
const sresults = document.getElementById('sresults');

document.getElementById('metaline').textContent =
  `${META.total_passos} passos • ${META.casados} com verba • ${META.sem_cod_verba} sem vínculo • join: ${META.chave_join}`;

META.fases_ordem.forEach(f => {
  const o = document.createElement('option'); o.value=f; o.textContent=f; selFase.appendChild(o);
});

// contagem por fase (estrutura completa do roteiro)
const faseCount = {};
PASSOS.forEach(p=>{ faseCount[p.fase]=(faseCount[p.fase]||0)+1; });
const fasesPresentes = META.fases_ordem.filter(f=>faseCount[f])
  .concat(Object.keys(faseCount).filter(f=>!META.fases_ordem.includes(f)));

function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function hl(s, q){
  s = esc(s);
  if(!q) return s;
  const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
  return s.replace(re,'<mark>$1</mark>');
}
function incLabel(p){
  const out=[]; const v=p.verba||{};
  if((v['Incide INSS']||'').toUpperCase()==='SIM') out.push(['inss','INSS']);
  if((v['Incide FGTS']||'').toUpperCase()==='SIM') out.push(['fgts','FGTS']);
  if((v['Incide IRRF']||'').toUpperCase()==='SIM') out.push(['irrf','IRRF']);
  return out;
}
// filtros "duros" (fase / natureza / incidência) — valem nos dois modos
function passFilters(p){
  const fFase = selFase.value, fNat = selNat.value, v = p.verba||{};
  if(fFase && p.fase!==fFase) return false;
  if(fNat){
    if(fNat==='__SEMV__'){ if(p.vinculo) return false; }
    else if((p.natureza||'').toUpperCase()!==fNat) return false;
  }
  if(inc.inss && (v['Incide INSS']||'').toUpperCase()!=='SIM') return false;
  if(inc.fgts && (v['Incide FGTS']||'').toUpperCase()!=='SIM') return false;
  if(inc.irrf && (v['Incide IRRF']||'').toUpperCase()!=='SIM') return false;
  return true;
}
function matchesText(p, q){
  if(!q) return true;
  return (p.nome_verba+' '+p.cod_verba+' '+p.descricao_formula+' '+p.arquivo_formula)
    .toLowerCase().includes(q);
}
function natTag(p){
  if(!p.vinculo) return '<span class="t semv">sem vínculo</span>';
  const n=(p.natureza||'').toUpperCase();
  return n? `<span class="t nat-${n}">${n}</span>` : '';
}
function activeSeq(){ return PASSOS.filter(passFilters); }

// ----- shared card builders -----
function passoRowsHTML(p){
  return `<dt>Ordem</dt><dd>#${p.ordem}</dd>`+
    `<dt>Descrição da fórmula</dt><dd>${esc(p.descricao_formula)}</dd>`+
    `<dt>Arquivo da fórmula</dt><dd>${esc(p.arquivo_formula)}</dd>`+
    `<dt>ID Fórmula</dt><dd>${esc(p.id_formula||'—')}</dd>`+
    `<dt>ID Cál. Básico</dt><dd>${esc(p.id_cal_basico||'—')}</dd>`+
    `<dt>Nome da verba (roteiro)</dt><dd>${esc(p.nome_verba||'—')}</dd>`+
    `<dt>Fase (editável)</dt><dd>${esc(p.fase)}</dd>`;
}
function attrRowsHTML(p){
  const v=p.verba||{}, cols=META.colunas_verba; let s='';
  if(p.vinculo){
    cols.forEach(c=>{ const val=(v[c]!==undefined&&v[c]!=='')?v[c]:'—';
      s+=`<dt>${esc(c)}</dt><dd>${esc(String(val))}</dd>`; });
  } else {
    s=`<dt>Vínculo</dt><dd><span class="t semv">sem vínculo</span> — passo estrutural sem verba no catálogo (cálculo básico / lançamento / contabilização).</dd>`;
  }
  return s;
}
function headerMetaHTML(p){
  return `<span class="badgep">${esc(p.fase)}</span> `+
    `<span class="pill">cod verba: ${esc(p.cod_verba||'—')}</span> `+
    `<span class="pill">ID fórmula: ${esc(p.id_formula||'—')}</span> `+
    `<span class="pill">${esc(p.arquivo_formula||'')}</span>`;
}
function posBlockHTML(p, jumpAttr){
  const reps = p.cod_verba ? (posByCod[p.cod_verba]||[]) : [];
  if(reps.length<=1) return '';
  const links = reps.map(r=>`<a ${jumpAttr}="${r.pos}">#${r.ordem}</a>`).join('');
  return `<div class="sec"><h4>Esta verba aparece em ${reps.length} ordens</h4><div class="poslist">${links}</div></div>`;
}

// ================= MINI-MAPA =================
function renderMinimap(){
  const mm = document.getElementById('minimap');
  const curFase = byPos[focusPos] ? byPos[focusPos].fase : null;
  mm.innerHTML = fasesPresentes.map(f=>
    `<span class="mm ${f===curFase?'cur':''}" data-fase="${esc(f)}">`+
    `${esc(f)}<span class="n">${faseCount[f]}</span></span>`).join('');
  mm.querySelectorAll('.mm').forEach(el=>{
    el.onclick = ()=>jumpToFase(el.dataset.fase);
  });
}
function jumpToFase(f){
  const seq = activeSeq();
  let target = seq.find(p=>p.fase===f) || PASSOS.find(p=>p.fase===f);
  if(!target) return;
  if(mode!=='trace') setMode('trace');
  setFocus(target.pos);
}

// ================= TRACE =================
function setFocus(pos){
  focusPos = pos;
  renderTrace();
  renderMinimap();
}
function trowHTML(p, opacity){
  const incs = incLabel(p).map(([k,l])=>`<span class="t inc inc-${k}">${l}</span>`).join('');
  return `<div class="trow" data-pos="${p.pos}" style="opacity:${opacity}">`+
    `<div class="ord">#${p.ordem}</div>`+
    `<div class="cod ${p.cod_verba?'':'none'}">${p.cod_verba||'—'}</div>`+
    `<div><div class="nm">${esc(p.nome_verba||p.descricao_formula)}</div>`+
    `<div class="dsc">${esc(p.descricao_formula)}</div></div>`+
    `<div class="tags"><span class="fasechip">${esc(p.fase)}</span>${natTag(p)}${incs}</div>`+
    `</div>`;
}
function focusCardHTML(p){
  return `<div class="focuscard" id="focuscard">`+
    `<div class="hd"><h3>#${p.ordem} · ${esc(p.nome_verba||p.descricao_formula)}</h3>`+
    `<div class="sub" style="margin-top:5px">${headerMetaHTML(p)}</div></div>`+
    `<div class="bd">`+
      `<div class="sec"><h4>Passo do roteiro</h4><dl class="kv">${passoRowsHTML(p)}</dl></div>`+
      `<div class="sec"><h4>Atributos da verba (catálogo)</h4><dl class="kv">${attrRowsHTML(p)}</dl></div>`+
      posBlockHTML(p,'data-pos')+
    `</div></div>`;
}
function renderTrace(){
  const view = document.getElementById('traceView');
  const seq = activeSeq();
  if(seq.length===0){ view.innerHTML='<div class="empty">Nenhum passo com esses filtros.</div>';
    document.getElementById('count').textContent='0 passos'; return; }

  let idx = seq.findIndex(p=>p.pos===focusPos);
  if(idx<0){ // foco saiu do conjunto filtrado -> aproxima pelo pos mais próximo
    let best=0,bd=Infinity;
    seq.forEach((p,i)=>{ const d=Math.abs(p.pos-focusPos); if(d<bd){bd=d;best=i;} });
    idx=best; focusPos=seq[best].pos;
  }
  const focus = seq[idx];
  let html='';
  // 5 anteriores (mais distante = mais atenuado), de cima p/ baixo
  const prevs=[];
  for(let k=5;k>=1;k--){ if(seq[idx-k]) prevs.push([seq[idx-k],k]); }
  if(prevs.length) html += `<div class="ctxlabel">▲ anteriores no roteiro</div>`;
  prevs.forEach(([p,k])=> html += trowHTML(p, (1-k*0.13).toFixed(2)) );
  // foco
  html += focusCardHTML(focus);
  // 5 posteriores
  const nexts=[];
  for(let k=1;k<=5;k++){ if(seq[idx+k]) nexts.push([seq[idx+k],k]); }
  if(nexts.length) html += `<div class="ctxlabel">▼ posteriores no roteiro</div>`;
  nexts.forEach(([p,k])=> html += trowHTML(p, (1-k*0.13).toFixed(2)) );
  html += `<div class="navhint">use <kbd>↑</kbd> <kbd>↓</kbd> para navegar &nbsp;·&nbsp; clique em qualquer passo para focar</div>`;

  view.innerHTML = html;
  view.querySelectorAll('.trow[data-pos]').forEach(el=>{
    el.onclick = ()=>setFocus(parseInt(el.dataset.pos,10));
  });
  view.querySelectorAll('.poslist a[data-pos]').forEach(a=>{
    a.onclick = ()=>setFocus(parseInt(a.dataset.pos,10));
  });
  document.getElementById('count').textContent = `#${focus.ordem} · ${idx+1}/${seq.length}`;
  const fc = document.getElementById('focuscard');
  if(fc && fc.scrollIntoView) fc.scrollIntoView({block:'center', behavior:'smooth'});
}

// ================= LISTA =================
function renderList(){
  const q = qEl.value.trim().toLowerCase();
  const view = document.getElementById('listView');
  view.innerHTML='';
  const shown = PASSOS.filter(p=>passFilters(p) && matchesText(p,q));
  document.getElementById('count').textContent = `${shown.length} / ${PASSOS.length} passos`;
  if(shown.length===0){ view.innerHTML='<div class="empty">Nenhum passo encontrado com esses filtros.</div>'; return; }

  const groups={};
  shown.forEach(p=>{ (groups[p.fase] ||= []).push(p); });
  const faseKeys = META.fases_ordem.filter(f=>groups[f])
    .concat(Object.keys(groups).filter(f=>!META.fases_ordem.includes(f)));

  faseKeys.forEach(f=>{
    const ph=document.createElement('div'); ph.className='phase';
    ph.innerHTML=`<h2>${esc(f)}</h2><span class="ln"></span><span class="pc">${groups[f].length}</span>`;
    view.appendChild(ph);
    groups[f].forEach(p=>{
      const el=document.createElement('div'); el.className='step';
      const incs=incLabel(p).map(([k,l])=>`<span class="t inc inc-${k}">${l}</span>`).join('');
      const reps=(posByCod[p.cod_verba]||[]).length>1?`<span class="t" title="aparece em ${posByCod[p.cod_verba].length} ordens">×${posByCod[p.cod_verba].length}</span>`:'';
      el.innerHTML=
        `<div class="ord">#${p.ordem}</div>`+
        `<div class="cod ${p.cod_verba?'':'none'}">${p.cod_verba||'—'}</div>`+
        `<div><div class="nm">${hl(p.nome_verba||p.descricao_formula,q)}</div>`+
        `<div class="dsc">${hl(p.descricao_formula,q)} · <span style="opacity:.7">${esc(p.arquivo_formula)}</span></div></div>`+
        `<div class="tags">${natTag(p)}${incs}${reps}</div>`;
      el.onclick=()=>openCard(p.pos);
      view.appendChild(el);
    });
  });
}

// modal (lista)
function openCard(pos){
  const p=byPos[pos], card=document.getElementById('card');
  const prev=byPos[pos-1], next=byPos[pos+1];
  function nbrRow(q,label,cur){ if(!q) return '';
    return `<div class="nbr ${cur?'cur':''}" data-pos="${q.pos}">`+
      `<div><div class="lbl">${label}</div><div class="ord">#${q.ordem}</div></div>`+
      `<div class="cod ${q.cod_verba?'':'none'}">${q.cod_verba||'—'}</div>`+
      `<div><div class="nm">${esc(q.nome_verba||q.descricao_formula)}</div>`+
      `<div class="dsc">${esc(q.descricao_formula)} · ${esc(q.fase)}</div></div></div>`; }
  card.innerHTML=
    `<div class="hd"><div><h3>#${p.ordem} · ${esc(p.nome_verba||p.descricao_formula)}</h3>`+
      `<div class="sub" style="margin-top:4px">${headerMetaHTML(p)}</div></div>`+
      `<button class="x" id="closeX">×</button></div>`+
    `<div class="bd">`+
      `<div class="sec"><h4>Passo do roteiro</h4><dl class="kv">${passoRowsHTML(p)}</dl></div>`+
      `<div class="sec"><h4>Atributos da verba (catálogo)</h4><dl class="kv">${attrRowsHTML(p)}</dl></div>`+
      posBlockHTML(p,'data-pos')+
      `<div class="sec"><h4>Vizinhança no roteiro</h4>`+
        nbrRow(prev,'anterior',false)+nbrRow(p,'este passo',true)+nbrRow(next,'posterior',false)+
      `</div>`+
    `</div>`;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('closeX').onclick=closeCard;
  card.querySelectorAll('[data-pos]').forEach(n=>{ n.onclick=()=>{ closeCard(); openCard(parseInt(n.dataset.pos,10)); }; });
}
function closeCard(){ document.getElementById('overlay').classList.remove('show'); }

// ================= BUSCA (dropdown no modo Trace) =================
function renderSearchDropdown(){
  const q = qEl.value.trim().toLowerCase();
  if(mode!=='trace' || !q){ sresults.classList.remove('show'); sresults.innerHTML=''; return; }
  const seq = activeSeq().filter(p=>matchesText(p,q)).slice(0,40);
  if(seq.length===0){ sresults.innerHTML='<div class="empty">Nenhum passo.</div>'; sresults.classList.add('show'); return; }
  sresults.innerHTML = seq.map(p=>
    `<div class="r" data-pos="${p.pos}">`+
    `<div class="ord">#${p.ordem}</div>`+
    `<div class="cod ${p.cod_verba?'':'none'}">${p.cod_verba||'—'}</div>`+
    `<div><div class="nm">${hl(p.nome_verba||p.descricao_formula,q)}</div>`+
    `<div class="dsc">${hl(p.descricao_formula,q)} · ${esc(p.fase)}</div></div></div>`).join('');
  sresults.classList.add('show');
  sresults.querySelectorAll('.r[data-pos]').forEach(r=>{
    r.onclick=()=>{ setFocus(parseInt(r.dataset.pos,10)); sresults.classList.remove('show'); qEl.blur(); };
  });
}

// ================= MODO =================
function setMode(m){
  mode=m;
  document.getElementById('mTrace').classList.toggle('on', m==='trace');
  document.getElementById('mList').classList.toggle('on', m==='list');
  document.getElementById('traceView').style.display = m==='trace'?'block':'none';
  document.getElementById('listView').style.display  = m==='list'?'block':'none';
  sresults.classList.remove('show');
  if(m==='trace'){ renderTrace(); } else { renderList(); }
  renderMinimap();
}

// ----- eventos -----
qEl.addEventListener('input', ()=>{ if(mode==='list') renderList(); else renderSearchDropdown(); });
qEl.addEventListener('focus', ()=>{ if(mode==='trace') renderSearchDropdown(); });
document.addEventListener('click', e=>{ if(!e.target.closest('.searchwrap')) sresults.classList.remove('show'); });
selFase.addEventListener('change', ()=>{ if(mode==='trace'){renderTrace();} else {renderList();} renderMinimap(); });
selNat.addEventListener('change',  ()=>{ if(mode==='trace'){renderTrace();} else {renderList();} renderMinimap(); });
document.querySelectorAll('.chip[data-inc]').forEach(ch=>{
  ch.onclick=()=>{ const k=ch.dataset.inc; inc[k]=!inc[k]; ch.classList.toggle('on',inc[k]);
    if(mode==='trace'){renderTrace(); if(qEl.value) renderSearchDropdown();} else {renderList();} renderMinimap(); };
});
document.getElementById('mTrace').onclick=()=>setMode('trace');
document.getElementById('mList').onclick =()=>setMode('list');

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ closeCard(); sresults.classList.remove('show'); return; }
  if(mode!=='trace') return;
  if(e.target===qEl) return;
  if(e.key==='ArrowUp' || e.key==='ArrowDown'){
    e.preventDefault();
    const seq=activeSeq(); let idx=seq.findIndex(p=>p.pos===focusPos);
    if(idx<0) return;
    if(e.key==='ArrowUp' && idx>0) setFocus(seq[idx-1].pos);
    if(e.key==='ArrowDown' && idx<seq.length-1) setFocus(seq[idx+1].pos);
  }
});
document.getElementById('overlay').onclick=e=>{ if(e.target.id==='overlay') closeCard(); };

// ----- init -----
document.getElementById('mTrace').classList.add('on');
setMode('trace');
</script>
</body>
</html>
